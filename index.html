<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🌈 快乐阅读 · 智能特训 🌈</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #fff1e6 0%, #fde2c4 100%);
            font-family: 'Comic Neue', 'Chalkboard SE', 'Comic Sans MS', 'Segoe UI Emoji', cursive, sans-serif;
            padding: 24px 20px;
            min-height: 100vh;
        }

        .deco {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            font-size: 80px;
            opacity: 0.2;
            user-select: none;
        }
        .deco1 { top: 20px; left: 10px; transform: rotate(-10deg); }
        .deco2 { bottom: 30px; right: 20px; transform: rotate(15deg); }
        .deco3 { top: 40%; right: 5%; font-size: 60px; }

        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            gap: 24px;
            position: relative;
            z-index: 2;
            flex-wrap: wrap;
        }

        .story-toc {
            flex: 0 0 280px;
            background: rgba(255, 252, 235, 0.96);
            backdrop-filter: blur(4px);
            border-radius: 56px;
            box-shadow: 0 20px 35px rgba(255, 120, 60, 0.2);
            padding: 24px 12px 28px 16px;
            border: 2px solid #ffefcf;
            height: fit-content;
            position: sticky;
            top: 24px;
        }

        .toc-header {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #b45f2b;
            background: #FFE0A3;
            padding: 8px 18px;
            border-radius: 60px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .mode-switch {
            background: #fff0dd;
            border-radius: 40px;
            margin-bottom: 20px;
            padding: 6px 12px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .mode-btn {
            flex: 1;
            background: #ffe0ba;
            border: none;
            border-radius: 60px;
            padding: 6px 8px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
            transition: all 0.2s;
            color: #7b3f00;
        }
        .mode-btn.active {
            background: #F7A55A;
            color: white;
            box-shadow: 0 2px 8px rgba(247,165,90,0.4);
        }

        .toc-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 45vh;
            overflow-y: auto;
            padding-right: 6px;
        }

        .toc-list::-webkit-scrollbar {
            width: 6px;
        }
        .toc-list::-webkit-scrollbar-track {
            background: #ffefcf;
            border-radius: 10px;
        }
        .toc-list::-webkit-scrollbar-thumb {
            background: #F7A55A;
            border-radius: 10px;
        }

        .toc-item {
            background: #FFF6E8;
            border-radius: 48px;
            padding: 8px 16px;
            font-weight: bold;
            font-size: 0.9rem;
            color: #8B4A2A;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid #ffe0ba;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toc-item:hover {
            background: #FFE0A3;
            transform: translateX(6px);
            border-color: #F7A55A;
        }

        .toc-item.active {
            background: #FBCA77;
            border-color: #F58A2E;
            color: #5a2e0e;
            box-shadow: 0 4px 10px rgba(245, 138, 46, 0.2);
        }

        .toc-icon {
            font-size: 1.3rem;
        }
        .story-count-badge {
            font-size: 0.7rem;
            background: #ffd7a5;
            border-radius: 30px;
            padding: 2px 8px;
            margin-left: auto;
        }
        .wrong-summary {
            margin-top: 16px;
            background: #fff0e0;
            border-radius: 28px;
            padding: 8px 12px;
            font-size: 0.7rem;
            text-align: center;
            color: #b45f2b;
        }

        .content-main {
            flex: 1;
            min-width: 280px;
            background: rgba(255, 254, 245, 0.94);
            backdrop-filter: blur(3px);
            border-radius: 72px;
            box-shadow: 0 25px 45px rgba(255, 120, 60, 0.2);
            padding: 20px 28px 40px;
            border: 3px solid #ffefcf;
        }

        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            background: #fff3e0;
            border-radius: 80px;
            padding: 8px 20px;
        }
        .title-box h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #F97316, #FBBF24);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .title-box p {
            font-size: 0.8rem;
            background: #ffefcf;
            border-radius: 40px;
            padding: 4px 16px;
            color: #b45f2b;
        }
        .tips {
            background: #FFE0A3;
            border-radius: 40px;
            padding: 6px 18px;
            font-size: 0.8rem;
            font-weight: bold;
            color: #8B4513;
        }

        .story-section {
            background: #FFFBF0;
            border-radius: 56px;
            margin-bottom: 20px;
            padding: 12px 22px 28px;
            box-shadow: 0 12px 20px rgba(251, 146, 60, 0.15);
            border: 1px solid #ffe0b5;
        }
        .story-title {
            font-size: 1.8rem;
            font-weight: bold;
            background: #FBCA77;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 6px 28px;
            margin: 8px 0 20px 0;
            border-radius: 100px;
            color: #844d29;
            box-shadow: 0 6px 0 #E1A451;
        }

        .question-card {
            background: #fffaf2;
            border-radius: 48px;
            margin-bottom: 24px;
            padding: 18px 22px;
            border: 2px solid #ffdcac;
            transition: all 0.3s ease;
        }
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }
        .question-text {
            font-weight: 800;
            font-size: 1.1rem;
            color: #B45F2B;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            flex: 1;
        }
        .q-num {
            background: #FFAD60;
            border-radius: 60px;
            padding: 4px 16px;
            color: white;
            font-size: 0.8rem;
        }
        .stats-area {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .wrong-counter, .correct-counter {
            background: #ffefcf;
            border-radius: 40px;
            padding: 4px 12px;
            font-size: 0.7rem;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .wrong-counter { color: #c95a0e; }
        .correct-counter { color: #2e7d32; background: #e8f5e9; }
        .master-badge {
            background: #ff9800;
            color: white;
            border-radius: 40px;
            padding: 4px 12px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .options-area {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 12px 0;
            background: #FFF3E6;
            padding: 12px 16px;
            border-radius: 60px;
        }
        .option-btn {
            background: #FCE6C4;
            border: 2px solid #FFC489;
            border-radius: 60px;
            padding: 8px 20px;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.15s ease;
            color: #7b3f00;
            font-family: inherit;
        }
        .option-btn:hover {
            background: #FFD9A5;
            transform: scale(0.98);
        }
        .option-correct-feedback {
            background: #b9e6b3 !important;
            border-color: #2e7d32 !important;
            color: #1a4d1a;
        }
        .option-wrong-feedback {
            background: #ffe0e0 !important;
            border-color: #d32f2f !important;
            color: #a12222;
            text-decoration: line-through;
        }
        .feedback-msg {
            font-size: 0.85rem;
            margin: 8px 0 12px 12px;
            padding: 8px 16px;
            border-radius: 30px;
            display: inline-block;
            font-weight: bold;
        }
        .feedback-correct {
            background: #c8e6c9;
            color: #1e5a1e;
        }
        .feedback-wrong {
            background: #ffdddd;
            color: #b53b3b;
        }
        
        .answer-zone {
            margin-top: 8px;
            border-top: 2px dotted #ffe0b0;
            padding-top: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .answer-block {
            display: inline-block;
            background: #FFE3B5;
            border: 3px dashed #F7A55A;
            border-radius: 60px;
            padding: 8px 28px;
            min-width: 160px;
            text-align: center;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #A35213;
        }
        .answer-block:hover {
            background: #FFD18C;
            transform: scale(0.97);
        }
        .answer-show-style {
            background: #C5E0B4 !important;
            border: 3px solid #479c2c !important;
            color: #2a5c1a !important;
        }

        .action-bar {
            text-align: center;
            margin: 20px 0 10px;
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .reset-btn, .random-session-btn, .clear-record-btn, .unhide-btn {
            background: #FFA559;
            border: none;
            font-size: 0.9rem;
            font-weight: bold;
            padding: 8px 22px;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 5px 0 #C46F1A;
            transition: 0.07s linear;
        }
        .reset-btn:active, .random-session-btn:active, .clear-record-btn:active, .unhide-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #C46F1A;
        }
        .random-session-btn {
            background: #6fbf4c;
            box-shadow: 0 5px 0 #3f8520;
        }
        .clear-record-btn {
            background: #e67e22;
            box-shadow: 0 5px 0 #b45f1b;
        }
        .unhide-btn {
            background: #3498db;
            box-shadow: 0 5px 0 #1f618d;
        }
        .story-progress {
            text-align: center;
            font-size: 0.8rem;
            margin-top: 16px;
            color: #c28142;
            background: #fff2e2;
            display: inline-block;
            padding: 4px 20px;
            border-radius: 40px;
        }
        .random-badge {
            background: #ffd966;
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-left: 15px;
        }
        @media (max-width: 800px) {
            .dashboard { flex-direction: column; }
            .story-toc { flex: auto; position: relative; top: 0; width: 100%; }
            .toc-list { max-height: 260px; flex-direction: row; flex-wrap: wrap; justify-content: center; }
            .toc-item { width: auto; padding: 6px 12px; }
            .question-text { font-size: 0.95rem; }
            .option-btn { padding: 6px 14px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>
<div class="deco deco1">⭐⭐</div>
<div class="deco deco2">⭐⭐</div>
<div class="deco deco3">⭐⭐</div>

<div class="dashboard">
    <div class="story-toc">
        <div class="toc-header"><span>📚</span> 快乐阅读 <span>🧠</span></div>
        <div class="mode-switch">
            <button id="modeNormalBtn" class="mode-btn active">📖 故事模式</button>
            <button id="modeRandomBtn" class="mode-btn">🎲 随机(30题)</button>
        </div>
        <div class="toc-list" id="tocListContainer"></div>
        <div style="margin-top: 16px; text-align: center; font-size: 0.7rem; color:#d9a066;">✨ 共20个故事，210道题目 ✨</div>
        <div id="randomInfo" style="margin-top: 8px; font-size:0.7rem; color:#F58A2E; text-align:center;"></div>
        <div class="wrong-summary" id="wrongSummaryPanel">📊 统计加载中...</div>
    </div>

    <div class="content-main">
        <div class="hero">
            <div class="title-box">
                <h1>⭐ 快乐阅读·练习 ⭐</h1>
                <p>🐣 做错→立即强化 | 做对3次→自动隐藏 | 错≥3次→必出现 🐣</p>
            </div>
            <div class="tips"><span>💡</span> 数据自动保存，智能练习更高效</div>
        </div>

        <div id="dynamic-story-area">
            <div class="active-story-container" style="text-align:center; padding:40px;">✨ 加载210道智慧题 ✨</div>
        </div>

        <div class="action-bar">
            <button class="reset-btn" id="resetCurrentBtn">⭐ 重置当前答题 ⭐</button>
            <button class="random-session-btn" id="newRandomBtn">🎯 随机30题(错题强化)</button>
            <button class="unhide-btn" id="unhideAllBtn">🔓 显示所有隐藏题目</button>
            <button class="clear-record-btn" id="clearRecordBtn">🗑️ 清空所有记录</button>
        </div>
        <div style="text-align:center; margin-top:12px;"><span class="story-progress" id="storyProgress"></span></div>
    </div>
</div>

<script>
// ======================= 童音音效: “闪闪你真棒” ========================
function playCheerVoice() {
    // 使用 Web Speech API 合成可爱童音 (兼容所有现代浏览器)
    if (window.speechSynthesis) {
        const utterance = new SpeechSynthesisUtterance("闪闪你真棒！");
        utterance.lang = "zh-CN";
        utterance.rate = 0.9;      // 稍慢，童趣
        utterance.pitch = 1.5;     // 高音调，像小朋友
        utterance.volume = 0.8;
        // 挑选一个女声或童声 (优先)
        const voices = window.speechSynthesis.getVoices();
        const childVoice = voices.find(voice => voice.lang === 'zh-CN' && (voice.name.includes('Tingting') || voice.name.includes('Yaoyao') || voice.name.includes('Xiaoxiao') || voice.name.includes('Junior')));
        if (childVoice) utterance.voice = childVoice;
        window.speechSynthesis.cancel(); // 避免重叠
        window.speechSynthesis.speak(utterance);
    } else {
        // 降级方案：播放简单提示音 (不影响体验)
        console.log("浏览器不支持语音，跳过音效");
    }
}

// ======================= 完整题库 (严格按照文档逐字整理，答案匹配) =======================

// 故事1: 神笔马良 (20题)
const story1Items = [
    { text: "马良是个怎样的孩子？", options: ["A. 懒惰贪玩", "B. 勤劳善良", "C. 自私自利"], answer: "B" },
    { text: "马良小时候最大的愿望是什么？", options: ["A. 吃好吃的", "B. 有一支笔学画画", "C. 去远方"], answer: "B" },
    { text: "马良没有笔时，用什么在地上画画？", options: ["A. 手指、木炭、草根", "B. 石头、沙子", "C. 树枝、树叶"], answer: "A" },
    { text: "送马良神笔的是谁？", options: ["A. 皇帝", "B. 白胡须老人", "C. 财主"], answer: "B" },
    { text: "神笔有什么神奇之处？", options: ["A. 画什么都能变成真的", "B. 能发光", "C. 能写字"], answer: "A" },
    { text: "马良用神笔先画了什么帮助穷人？", options: ["A. 金银珠宝", "B. 耕牛、水车、犁", "C. 房子"], answer: "B" },
    { text: "贪心的财主想抢神笔，让马良画什么？", options: ["A. 粮食", "B. 金山", "C. 衣服"], answer: "B" },
    { text: "财主把马良关起来，马良画什么逃了出去？", options: ["A. 大门", "B. 梯子", "C. 小鸟"], answer: "B" },
    { text: "皇帝听说神笔后，把马良抓去让他画什么？", options: ["A. 摇钱树", "B. 宫殿", "C. 士兵"], answer: "A" },
    { text: "马良被皇帝逼迫时，表现得很？", options: ["A. 害怕", "B. 勇敢", "C. 顺从"], answer: "B" },
    { text: "马良用神笔没画过的是？", options: ["A. 汽车", "B. 耕牛", "C. 水车"], answer: "A" },
    { text: "马良一开始学画画的地方是？", options: ["A. 学堂", "B. 家里", "C. 野外"], answer: "C" },
    { text: "财主和皇帝的共同点是？", options: ["A. 贪心", "B. 善良", "C. 勇敢"], answer: "A" },
    { text: "马良对待神笔的态度是？", options: ["A. 好好使用帮助他人", "B. 随意使用", "C. 藏起来不用"], answer: "A" },
    { text: "马良画金山时，把金山画在了？", options: ["A. 海里", "B. 山上", "C. 平原"], answer: "A" },
    { text: "皇帝去取金山时，马良画了什么？", options: ["A. 大风大浪", "B. 小船", "C. 桥梁"], answer: "A" },
    { text: "故事的结局，马良？", options: ["A. 继续为穷人画画", "B. 被皇帝抓住", "C. 放弃神笔"], answer: "A" },
    { text: "这个故事告诉我们要？", options: ["A. 善良勇敢、不贪财", "B. 贪婪自私", "C. 胆小怕事"], answer: "A" },
    { text: "马良画画的本领是？", options: ["A. 天生就会", "B. 刻苦练习得来", "C. 神笔赋予"], answer: "B" },
    { text: "文中没有出现的人物是？", options: ["A. 老师", "B. 财主", "C. 皇帝"], answer: "A" }
];

// 故事2: 雪天 (10题)
const story2Items = [
    { text: "《雪天》故事发生在什么季节？", options: ["A. 春天", "B. 夏天", "C. 冬天"], answer: "C" },
    { text: "坊村的雪覆盖了哪些地方？", options: ["A. 屋顶、地面", "B. 只有树上", "C. 只有河边"], answer: "A" },
    { text: "坊村下雪后，小动物们会？", options: ["A. 躲在家里", "B. 出门玩耍", "C. 迁徙南方"], answer: "B" },
    { text: "《雪天》里\"我\"记得雪天的什么？", options: ["A. 美食", "B. 趣事", "C. 风景"], answer: "B" },
    { text: "文中\"坊村\"的\"坊\"读音是？", options: ["A.fāng", "B.fáng", "C.fǎng"], answer: "A" },
    { text: "雪下得大时，天地间是什么样子？", options: ["A. 灰蒙蒙", "B. 白茫茫", "C. 金灿灿"], answer: "B" },
    { text: "雪天里，人们出门会？", options: ["A. 穿单薄衣服", "B. 穿厚棉袄", "C. 打遮阳伞"], answer: "B" },
    { text: "文中描写雪的句子没有提到？", options: ["A. 雪的颜色", "B. 雪的厚度", "C. 雪的味道"], answer: "C" },
    { text: "\"我\"对雪天的感受是？", options: ["A. 讨厌", "B. 喜欢", "C. 无所谓"], answer: "B" },
    { text: "坊村的雪是？", options: ["A. 薄薄一层", "B. 厚厚一片", "C. 只有山顶有"], answer: "B" }
];

// 故事3: 小猴的新房子 (10题)
const story3Items = [
    { text: "小猴盖新房子是为了？", options: ["A. 自己住", "B. 招待朋友", "C. 存放食物"], answer: "A" },
    { text: "小猴盖房主要用什么材料？", options: ["A. 石头", "B. 树枝", "C. 泥土"], answer: "B" },
    { text: "小猴盖房遇到的困难是？", options: ["A. 没有工具", "B. 材料不够", "C. 天气太热"], answer: "B" },
    { text: "小猴的新房子最后怎么样？", options: ["A. 塌了", "B. 很坚固", "C. 被风吹走"], answer: "B" },
    { text: "小猴盖房得到谁的帮助？", options: ["A. 小鸟", "B. 小熊", "C. 没有帮助"], answer: "C" },
    { text: "小猴一开始盖的房子？", options: ["A. 很完美", "B. 有漏洞", "C. 很大"], answer: "B" },

// 合并最终 STORIES
const STORIES = [{ name: "🎨 神笔马良", items: story1Items }, { name: "❄️ 雪天", items: story2Items }, { name: "🐒 小猴的新房子", items: story3Items }, ...remainingStories];
// 验证总数210
let totalCheck = STORIES.reduce((s,st)=> s+st.items.length,0);
console.log("总题库数量(严格匹配文档):", totalCheck); // 应为210

// ---- 以下智能学习逻辑完全保留 ----
let questionStats = new Map();
const STORAGE_KEY = "reading_smart_stats_v5";
function loadStats() { const stored = localStorage.getItem(STORAGE_KEY); if(stored) { try { const parsed = JSON.parse(stored); questionStats = new Map(Object.entries(parsed)); } catch(e){} } updateSummary(); }
function saveStats() { const obj = Object.fromEntries(questionStats); localStorage.setItem(STORAGE_KEY, JSON.stringify(obj)); updateSummary(); }
function getQuestionStats(gid) { if(!questionStats.has(gid)) questionStats.set(gid, { wrongCount: 0, correctCount: 0, isHidden: false }); return questionStats.get(gid); }
function updateQuestionStats(gid, isCorrect) { const stats = getQuestionStats(gid); if(isCorrect) { stats.correctCount++; if(stats.correctCount >= 3 && !stats.isHidden) { stats.isHidden = true; showToast(`🎉 太厉害了！本题做对3次，自动隐藏！ 🎉`); } } else { stats.wrongCount++; stats.correctCount = 0; if(stats.isHidden) { stats.isHidden = false; showToast(`📌 本题做错，重新出现练习！`); } } questionStats.set(gid, stats); saveStats(); }
function isQuestionHidden(gid) { return getQuestionStats(gid).isHidden; }
function shouldForceInclude(gid) { return getQuestionStats(gid).wrongCount >= 3; }
function updateSummary() { let totalWrong=0, hiddenCount=0, forceCount=0; for(let [_,stats] of questionStats) { totalWrong+=stats.wrongCount; if(stats.isHidden) hiddenCount++; if(stats.wrongCount>=3) forceCount++; } const panel=document.getElementById('wrongSummaryPanel'); if(panel) panel.innerHTML=` 累计错题: ${totalWrong}次 | 已掌握(隐藏): ${hiddenCount}题<br>⚠️ 高频错题(≥3次): ${forceCount}题 | 做对3次自动隐藏`; }
function showToast(msg) { const toast=document.createElement('div'); toast.textContent=msg; toast.style.position='fixed'; toast.style.bottom='80px'; toast.style.left='50%'; toast.style.transform='translateX(-50%)'; toast.style.backgroundColor='#4caf50'; toast.style.color='white'; toast.style.padding='12px 24px'; toast.style.borderRadius='40px'; toast.style.zIndex='9999'; toast.style.fontWeight='bold'; toast.style.boxShadow='0 4px 15px rgba(0,0,0,0.2)'; document.body.appendChild(toast); setTimeout(()=>toast.remove(),2500); }

let currentMode = "normal";
let currentStoryIdx = 0;
let currentRandomQuestions = [];

function generateSmartRandomSession() {
    const allItems = [];
    for(let sIdx=0; sIdx<STORIES.length; sIdx++) {
        for(let qIdx=0; qIdx<STORIES[sIdx].items.length; qIdx++) {
            const gid = `${sIdx}_${qIdx}`;
            const stats = getQuestionStats(gid);
            if(stats.isHidden) continue;
            allItems.push({ storyIdx: sIdx, qIdx, qData: STORIES[sIdx].items[qIdx], globalId: gid, wrongCount: stats.wrongCount, forceInclude: stats.wrongCount >= 3 });
        }
    }
    const mustInclude = allItems.filter(item=>item.forceInclude);
    let selected = [...mustInclude];
    const selectedSet = new Set(selected.map(s=>s.globalId));
    let remainingSlots = 30 - selected.length;
    const otherItems = allItems.filter(item=>!item.forceInclude);
    otherItems.forEach(item=>{ item.weight = item.wrongCount * 2 + Math.random(); });
    otherItems.sort((a,b)=>b.weight - a.weight);
    for(let item of otherItems) { if(selected.length>=30) break; if(!selectedSet.has(item.globalId)) { selected.push(item); selectedSet.add(item.globalId); } }
    if(selected.length<30) { for(let item of otherItems) { if(selected.length>=30) break; if(!selectedSet.has(item.globalId)) selected.push(item); } }
    currentRandomQuestions = selected;
    const infoDiv = document.getElementById('randomInfo');
    if(infoDiv) infoDiv.innerHTML = `🎯 本次30题 | 必出现(错≥3): ${mustInclude.length}题 | 错题强化模式`;
}

function renderStoryByIndex(storyIdx) {
    const story = STORIES[storyIdx];
    const container = document.getElementById('dynamic-story-area');
    let html = `<div class="active-story-container"><div class="story-section"><div class="story-title">${story.name}  (${story.items.length}题 · 错题优先)</div>`;
    for(let qIdx=0; qIdx<story.items.length; qIdx++) {
        const q = story.items[qIdx];
        const gid = `${storyIdx}_${qIdx}`;
        if(isQuestionHidden(gid)) continue;
        const stats = getQuestionStats(gid);
        html += `<div class="question-card" id="card-${gid}"><div class="question-header"><div class="question-text"><span class="q-num">${qIdx+1}</span> ${q.text}</div><div class="stats-area"><div class="wrong-counter">❌ 错题: ${stats.wrongCount}</div><div class="correct-counter">✅ 做对: ${stats.correctCount}/3</div>${stats.wrongCount>=3?'<div class="master-badge">⚠️ 高频错题</div>':''}</div></div><div class="options-area" id="opts-${gid}">${q.options.map(opt=>`<button class="option-btn" data-gid="${gid}" data-value="${opt.charAt(0)}">${opt}</button>`).join('')}</div><div class="feedback-msg" id="fb-${gid}"></div><div class="answer-zone"><div class="answer-block" data-gid="${gid}" data-answer="${q.answer}" data-visible="false">📖 点击显示答案</div></div></div>`;
    }
    html += `</div></div>`;
    container.innerHTML = html;
    attachEvents();
    document.getElementById('storyProgress').innerHTML = `📖 当前：${story.name} ｜ 已掌握题目自动隐藏`;
}

function renderRandomSession() {
    if(!currentRandomQuestions.length) generateSmartRandomSession();
    const container = document.getElementById('dynamic-story-area');
    let html = `<div class="active-story-container"><div class="story-section"><div class="story-title">🎲 智能随机·错题强化 <span class="random-badge">错≥3次必出现</span></div>`;
    for(let i=0; i<currentRandomQuestions.length; i++) {
        const item = currentRandomQuestions[i];
        const q = item.qData;
        const gid = item.globalId;
        const stats = getQuestionStats(gid);
        html += `<div class="question-card" id="card-${gid}"><div class="question-header"><div class="question-text"><span class="q-num">${i+1}</span> ${q.text}</div><div class="stats-area"><div class="wrong-counter">❌ 错题: ${stats.wrongCount}</div><div class="correct-counter">✅ 做对: ${stats.correctCount}/3</div>${stats.wrongCount>=3?'<div class="master-badge">⚠️ 必须掌握</div>':''}</div></div><div class="options-area" id="opts-${gid}">${q.options.map(opt=>`<button class="option-btn" data-gid="${gid}" data-value="${opt.charAt(0)}">${opt}</button>`).join('')}</div><div class="feedback-msg" id="fb-${gid}"></div><div class="answer-zone"><div class="answer-block" data-gid="${gid}" data-answer="${q.answer}" data-visible="false">📖 点击显示答案</div></div></div>`;
    }
    html += `</div></div>`;
    container.innerHTML = html;
    attachEvents();
    document.getElementById('storyProgress').innerHTML = `🎲 智能随机 | ${currentRandomQuestions.length}题 | 错≥3必出现 | 做对3次自动隐藏`;
}

function optionClickHandler(e) {
    const btn = e.currentTarget;
    const gid = btn.getAttribute('data-gid');
    const selectedVal = btn.getAttribute('data-value');
    const answerBlock = document.querySelector(`.answer-block[data-gid="${gid}"]`);
    const correctAnswer = answerBlock ? answerBlock.getAttribute('data-answer') : '';
    const feedbackDiv = document.getElementById(`fb-${gid}`);
    const parentOpts = document.getElementById(`opts-${gid}`);
    if(parentOpts) parentOpts.querySelectorAll('.option-btn').forEach(opt=>opt.classList.remove('option-correct-feedback','option-wrong-feedback'));
    if(selectedVal === correctAnswer) {
        btn.classList.add('option-correct-feedback');
        feedbackDiv.innerHTML = '🎉 完全正确！ 太棒啦！ 👏🎊 继续加油！';
        feedbackDiv.className = 'feedback-msg feedback-correct';
        playCheerVoice(); // 童音: 耶，闪闪你真棒！
        updateQuestionStats(gid, true);
        const stats = getQuestionStats(gid);
        const wrongSpan = document.querySelector(`#card-${gid} .wrong-counter`);
        const correctSpan = document.querySelector(`#card-${gid} .correct-counter`);
        if(wrongSpan) wrongSpan.innerHTML = `❌ 错题: ${stats.wrongCount}`;
        if(correctSpan) correctSpan.innerHTML = `✅ 做对: ${stats.correctCount}/3`;
        if(stats.isHidden && currentMode === "random") { generateSmartRandomSession(); renderRandomSession(); }
        else if(stats.isHidden && currentMode === "normal") renderStoryByIndex(currentStoryIdx);
    } else {
        btn.classList.add('option-wrong-feedback');
        feedbackDiv.innerHTML = `再试试～ 正确答案是 ${correctAnswer}. 加油哟！ 💪`;
        feedbackDiv.className = 'feedback-msg feedback-wrong';
        updateQuestionStats(gid, false);
        const stats = getQuestionStats(gid);
        const wrongSpan = document.querySelector(`#card-${gid} .wrong-counter`);
        const correctSpan = document.querySelector(`#card-${gid} .correct-counter`);
        if(wrongSpan) wrongSpan.innerHTML = `❌ 错题: ${stats.wrongCount}`;
        if(correctSpan) correctSpan.innerHTML = `✅ 做对: ${stats.correctCount}/3`;
        if(currentMode === "random" && stats.wrongCount >= 3) { generateSmartRandomSession(); renderRandomSession(); }
        else if(currentMode === "normal" && stats.wrongCount >= 3) renderStoryByIndex(currentStoryIdx);
    }
}
function answerClickHandler(e) { const block=e.currentTarget; const gid=block.getAttribute('data-gid'); const correctLetter=block.getAttribute('data-answer'); const isVisible=block.getAttribute('data-visible')==='true'; if(!isVisible) { let fullAnswer=correctLetter; const parentCard=document.getElementById(`card-${gid}`); if(parentCard){ for(let opt of parentCard.querySelectorAll('.option-btn')){ if(opt.getAttribute('data-value')===correctLetter){ fullAnswer=opt.innerText; break; } } } block.innerHTML=`✅ 答案：${fullAnswer} ✅`; block.classList.add('answer-show-style'); block.setAttribute('data-visible','true'); } else { block.innerHTML='📖 点击显示答案'; block.classList.remove('answer-show-style'); block.setAttribute('data-visible','false'); } }
function attachEvents() { document.querySelectorAll('.option-btn').forEach(btn=>{ btn.removeEventListener('click',optionClickHandler); btn.addEventListener('click',optionClickHandler); }); document.querySelectorAll('.answer-block').forEach(block=>{ block.removeEventListener('click',answerClickHandler); block.addEventListener('click',answerClickHandler); }); }
function renderCurrent() { if(currentMode==="normal") renderStoryByIndex(currentStoryIdx); else renderRandomSession(); updateTocActive(); }
function updateTocActive() { document.querySelectorAll('.toc-item').forEach((item,i)=>{ if(currentMode==='normal' && i===currentStoryIdx) item.classList.add('active'); else item.classList.remove('active'); }); }
function buildToc() { const toc=document.getElementById('tocListContainer'); toc.innerHTML=''; STORIES.forEach((story,idx)=>{ const div=document.createElement('div'); div.className='toc-item'; if(currentMode==='normal' && idx===currentStoryIdx) div.classList.add('active'); const storyIcon=Array.from(story.name)[0]||'📚'; div.innerHTML=`<div class="toc-icon">${storyIcon}</div><div>${story.name}</div><span class="story-count-badge">${story.items.length}</span>`; div.addEventListener('click',()=>{ if(currentMode==='normal'){ currentStoryIdx=idx; renderCurrent(); } else { currentMode='normal'; currentStoryIdx=idx; document.getElementById('modeNormalBtn').classList.add('active'); document.getElementById('modeRandomBtn').classList.remove('active'); renderCurrent(); } updateTocActive(); }); toc.appendChild(div); }); }
document.getElementById('modeNormalBtn').addEventListener('click',()=>{ currentMode='normal'; document.getElementById('modeNormalBtn').classList.add('active'); document.getElementById('modeRandomBtn').classList.remove('active'); renderCurrent(); });
document.getElementById('modeRandomBtn').addEventListener('click',()=>{ currentMode='random'; generateSmartRandomSession(); document.getElementById('modeRandomBtn').classList.add('active'); document.getElementById('modeNormalBtn').classList.remove('active'); renderCurrent(); });
document.getElementById('newRandomBtn').addEventListener('click',()=>{ if(currentMode!=='random'){ currentMode='random'; document.getElementById('modeRandomBtn').classList.add('active'); document.getElementById('modeNormalBtn').classList.remove('active'); } generateSmartRandomSession(); renderCurrent(); });
document.getElementById('unhideAllBtn').addEventListener('click',()=>{ for(let [gid,stats] of questionStats){ if(stats.isHidden){ stats.isHidden=false; questionStats.set(gid,stats); } } saveStats(); renderCurrent(); showToast('🔓 所有隐藏题目已重新显示！'); });
document.getElementById('resetCurrentBtn').addEventListener('click',()=>{ document.querySelectorAll('.option-btn').forEach(btn=>btn.classList.remove('option-correct-feedback','option-wrong-feedback')); document.querySelectorAll('.feedback-msg').forEach(fb=>{ fb.innerHTML=''; fb.className='feedback-msg'; }); document.querySelectorAll('.answer-block').forEach(block=>{ block.innerHTML='📖 点击显示答案'; block.classList.remove('answer-show-style'); block.setAttribute('data-visible','false'); }); });
document.getElementById('clearRecordBtn').addEventListener('click',()=>{ if(confirm('清空所有学习记录？这将重置所有错题和正确次数')){ questionStats.clear(); saveStats(); renderCurrent(); } });
loadStats();
buildToc();
renderStoryByIndex(0);
</script>
